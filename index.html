<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>West Bengal — Districts & GI Tags</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Bengali&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5efe4;--deep:#1a1008;--ochre:#c8821a;--rust:#9b3a1a;
  --teal:#1e6b6b;--indigo:#2d3a7a;--rose:#8b2252;--gold:#d4a017;
  --panel:#fdf7ee;--border:#e0d0b0
}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--deep);font-family:'Libre Baskerville',Georgia,serif;min-height:100vh}

header{
  background:var(--deep);padding:1.1rem 1.6rem;
  display:flex;flex-wrap:wrap;align-items:baseline;gap:.6rem 1.2rem;
  border-bottom:3px solid var(--ochre)
}
header h1{font-family:'Tiro Devanagari Bengali',serif;font-size:clamp(1.1rem,3vw,1.8rem);color:var(--gold)}
header span{font-family:'DM Mono',monospace;font-size:.65rem;color:#a89880;letter-spacing:.14em;text-transform:uppercase}

.top{display:flex;align-items:flex-start;width:100%}

.map-col{
  flex:0 0 auto;width:52%;max-width:560px;
  padding:1.3rem 1rem 1.3rem 1.4rem;
  display:flex;flex-direction:column;align-items:flex-start
}
.map-hint{
  font-family:'DM Mono',monospace;font-size:.63rem;letter-spacing:.13em;
  color:var(--ochre);text-transform:uppercase;margin-bottom:.6rem
}

.map-wrap{position:relative;width:100%;display:block;line-height:0}
.map-wrap img{width:100%;height:auto;display:block;cursor:crosshair}
#hl-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

#tooltip{
  position:fixed;background:var(--deep);color:var(--gold);
  font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.08em;
  padding:.32rem .68rem;border-radius:3px;pointer-events:none;z-index:9999;
  opacity:0;transition:opacity .12s;white-space:nowrap;
  box-shadow:0 2px 12px rgba(0,0,0,.45)
}

.panel-col{
  flex:1 1 0;min-width:0;background:var(--panel);
  border-left:3px solid var(--ochre);
  padding:1.4rem 1.2rem;align-self:stretch;min-height:460px
}
.placeholder{
  height:100%;min-height:280px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.9rem;opacity:.38
}
.placeholder svg{width:46px}
.placeholder p{
  font-family:'DM Mono',monospace;font-size:.66rem;
  letter-spacing:.1em;text-align:center;text-transform:uppercase;line-height:1.8
}
.d-card{display:none}
.d-card.on{display:block;animation:fu .26s ease}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.d-badge{
  display:inline-block;font-family:'DM Mono',monospace;font-size:.57rem;
  letter-spacing:.15em;text-transform:uppercase;
  background:var(--deep);color:var(--gold);padding:.17rem .62rem;margin-bottom:.7rem
}
.d-name{font-family:'Tiro Devanagari Bengali',serif;font-size:1.45rem;color:var(--rust);line-height:1.2;margin-bottom:.9rem}
.d-sec{margin-bottom:1rem}
.d-sec h3{
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ochre);
  border-bottom:1px solid var(--border);padding-bottom:.26rem;margin-bottom:.5rem
}
.hl-list{list-style:none}
.hl-list li{font-size:.8rem;line-height:1.65;padding-left:.95rem;position:relative;color:#3a2510}
.hl-list li::before{content:'›';position:absolute;left:0;color:var(--ochre);font-weight:700}
.gi-stack{display:flex;flex-direction:column;gap:.42rem}
.gi-pill{display:flex;justify-content:space-between;align-items:center;gap:.4rem;padding:.38rem .62rem;border-radius:3px;color:#f5efe4}
.gi-pill.v{background:var(--rose)}
.gi-pill.m{background:var(--indigo)}
.gi-pill.r{background:var(--teal)}
.gi-pill.s{background:#5a6a3a;opacity:.75}
.gi-pill .gn{font-size:.77rem;font-style:italic;flex:1}
.gi-pill .gy{font-family:'DM Mono',monospace;font-size:.6rem;background:rgba(255,255,255,.17);padding:.07rem .38rem;border-radius:2px;white-space:nowrap;color:#f5d080}
.no-gi{font-family:'DM Mono',monospace;font-size:.64rem;color:#a08060;letter-spacing:.07em}

hr.div{border:none;border-top:2px solid var(--border)}

.tbl-sec{width:100%;padding:1.6rem 1.5rem 3rem}
.tbl-sec h2{font-family:'Tiro Devanagari Bengali',serif;font-size:1.15rem;color:var(--rust);margin-bottom:.9rem}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;width:100%;min-width:580px;font-size:.78rem}
thead tr{background:var(--deep);color:var(--gold);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase}
th{padding:.62rem .85rem;text-align:left;white-space:nowrap}
td{padding:.52rem .85rem;border-bottom:1px solid var(--border);vertical-align:top}
tbody tr{cursor:pointer;transition:background .12s}
tbody tr:hover{background:#f0e5d0}
tbody tr.on{background:#ffe8b8}
td.dn{font-weight:700;color:var(--rust);white-space:nowrap}
td.gc{font-style:italic;color:var(--teal);font-size:.74rem}
td.nr{font-family:'DM Mono',monospace;font-size:.64rem;color:#a08060}

.gi-legend{display:flex;flex-wrap:wrap;gap:.5rem 1rem;margin-top:1rem}
.gi-legend li{list-style:none;display:flex;align-items:center;gap:.35rem;font-family:'DM Mono',monospace;font-size:.6rem;color:#5a4030}
.gi-legend .dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}

@media(max-width:780px){
  .top{flex-direction:column}
  .map-col{width:100%;max-width:100%;padding:1rem .8rem}
  .panel-col{border-left:none;border-top:3px solid var(--ochre);width:100%;min-height:0}
  .tbl-sec{padding:1.1rem .9rem 2.5rem}
}
@media(max-width:420px){
  header{padding:.9rem 1rem}
  .map-col{padding:.7rem .5rem}
  .panel-col{padding:1rem .85rem}
}
</style>
</head>

const STATE_GI=[
  {n:"Nakshi Kantha",y:2008},{n:"Banglar Rasogolla",y:2017},
  {n:"Bengal Dokra Art",y:2018},{n:"Nolen Gur Sandesh",y:2025},{n:"Radhunipagol Rice",y:2025}
];

function pillClass(y){return y<=2012?'v':y<=2019?'m':'r'}

/* ── RENDER PANEL CARD ───────────────── */
function renderCard(id){
  const d=DATA[id]; if(!d)return;
  const giHTML=d.gi.length
    ?d.gi.map(g=>`<div class="gi-pill ${pillClass(g.y)}"><span class="gn">${g.n}</span><span class="gy">${g.y}</span></div>`).join('')
    :`<p class="no-gi">No GI tag registered yet</p>`;
  document.getElementById('dcard').innerHTML=`
    <div class="d-badge">${d.region}</div>
    <div class="d-name">${d.name}</div>
    <div class="d-sec">
      <h3>Key Highlights</h3>
      <ul class="hl-list">${d.hi.map(h=>`<li>${h}</li>`).join('')}</ul>
    </div>
    <div class="d-sec">
      <h3>GI Tags</h3>
      <div class="gi-stack">${giHTML}</div>
    </div>
    <div class="d-sec">
      <h3>State-wide GI Heritage</h3>
      <div class="gi-stack">${STATE_GI.map(g=>`<div class="gi-pill s"><span class="gn">${g.n}</span><span class="gy">${g.y}</span></div>`).join('')}</div>
    </div>`;
  document.getElementById('ph').style.display='none';
  const c=document.getElementById('dcard');
  c.classList.remove('on'); void c.offsetWidth; c.classList.add('on');
}

/* ── RESPONSIVE IMAGE MAP ────────────── */
const ORIG_W=960, ORIG_H=1449;
const img=document.getElementById('mapImg');
const canvas=document.getElementById('hl-canvas');
const ctx=canvas.getContext('2d');
const tooltip=document.getElementById('tooltip');

// Store original coords
const ORIG_POLYS={};
document.querySelectorAll('#wbmap area').forEach(a=>{
  const pts=a.getAttribute('coords').replace(/\s+/g,' ').trim().split(/[\s,]+/).map(Number);
  const pairs=[];
  for(let i=0;i<pts.length;i+=2) pairs.push([pts[i],pts[i+1]]);
  ORIG_POLYS[a.dataset.id]=pairs;
});

function getScale(){
  return img.getBoundingClientRect().width/ORIG_W;
}
function resizeMap(){
  const sc=getScale();
  document.querySelectorAll('#wbmap area').forEach(a=>{
    const pts=ORIG_POLYS[a.dataset.id];
    a.setAttribute('coords',pts.map(([x,y])=>`${Math.round(x*sc)},${Math.round(y*sc)}`).join(','));
  });
  const r=img.getBoundingClientRect();
  canvas.width=r.width; canvas.height=r.height;
  if(currentId) drawHighlight(currentId);
}

let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(resizeMap,80)});
img.addEventListener('load',resizeMap);
if(img.complete) setTimeout(resizeMap,50);

/* ── CANVAS HIGHLIGHT ────────────────── */
let currentId=null;
function drawHighlight(id){
  const r=img.getBoundingClientRect();
  canvas.width=r.width; canvas.height=r.height;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!id||!ORIG_POLYS[id])return;
  const sc=getScale();
  const pts=ORIG_POLYS[id];
  ctx.beginPath();
  ctx.moveTo(pts[0][0]*sc,pts[0][1]*sc);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0]*sc,pts[i][1]*sc);
  ctx.closePath();
  ctx.fillStyle='rgba(200,130,26,0.30)';
  ctx.strokeStyle='rgba(155,58,26,0.90)';
  ctx.lineWidth=2.5;
  ctx.fill();
  ctx.stroke();
}

/* ── SELECT ──────────────────────────── */
function select(id){
  currentId=id;
  drawHighlight(id);
  renderCard(id);
  document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('on'));
  const row=document.querySelector(`#tbody tr[data-id="${id}"]`);
  if(row){row.classList.add('on');row.scrollIntoView({behavior:'smooth',block:'nearest'})}
  if(window.innerWidth<=780){
    document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'start'});
  }
}

/* ── AREA EVENT LISTENERS ────────────── */
document.querySelectorAll('#wbmap area').forEach(a=>{
  a.addEventListener('click',e=>{e.preventDefault();select(a.dataset.id)});
  a.addEventListener('mousemove',e=>{
    const d=DATA[a.dataset.id];
    tooltip.textContent=d?d.name:a.alt;
    tooltip.style.opacity='1';
    tooltip.style.left=(e.clientX+14)+'px';
    tooltip.style.top=(e.clientY-10)+'px';
  });
  a.addEventListener('mouseleave',()=>{tooltip.style.opacity='0'});
});

/* ── BUILD TABLE ─────────────────────── */
const tbody=document.getElementById('tbody');
let n=1;
for(const [id,d] of Object.entries(DATA)){
  const tr=document.createElement('tr');
  tr.dataset.id=id;
  const gs=d.gi.length?d.gi.map(g=>`${g.n} (${g.y})`).join(' · '):'—';
  tr.innerHTML=`
    <td class="nr">${String(n).padStart(2,'0')}</td>
    <td class="dn">${d.name}</td>
    <td style="font-family:'DM Mono',monospace;font-size:.65rem;color:#5a4030;white-space:nowrap">${d.region}</td>
    <td>${d.hi.slice(0,3).join(', ')}</td>
    <td class="gc">${gs}</td>`;
  tr.addEventListener('click',()=>{
    select(id);
    document.getElementById('mapWrap').scrollIntoView({behavior:'smooth',block:'nearest'});
  });
  tbody.appendChild(tr);n++;
}

const note=document.createElement('p');
note.style.cssText='font-family:DM Mono,monospace;font-size:.6rem;color:#a08060;margin-top:.75rem;letter-spacing:.06em';
note.textContent='* Tangail Saree GI tag is jointly held by Purba Bardhaman & Nadia districts.';
document.querySelector('.tbl-sec').appendChild(note);
</script>
